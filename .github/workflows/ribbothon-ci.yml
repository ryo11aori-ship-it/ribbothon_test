          jne .n4
          dec byte [es:di]
          jmp main_loop
          .n4: cmp al, '5'
          jne .n5
          mov al, [es:di]
          mov [fs:bp], al
          inc bp
          jmp main_loop
          .n5: cmp al, '6'
          jne .n6
          mov al, [gs:bx]
          inc bx
          or al, al
          jnz .save
          dec bx
          mov al, 0xff
          .save:
          mov [es:di], al
          jmp main_loop
          .n6: cmp al, '7'
          jne .n7
          cmp byte [es:di], 0
          jnz main_loop
          mov dx, 1
          .fwd: lodsb
          cmp al, '7'
          jne .f1
          inc dx
          .f1: cmp al, '8'
          jne .f2
          dec dx
          .f2: test dx, dx
          jnz .fwd
          jmp main_loop
          .n7: cmp al, '8'
          jne .n8
          cmp byte [es:di], 0
          jz main_loop
          sub si, 2
          mov dx, 1
          .bwd: mov al, [si]
          dec si
          cmp al, '8'
          jne .b1
          inc dx
          .b1: cmp al, '7'
          jne .b2
          dec dx
          .b2: test dx, dx
          jnz .bwd
          add si, 2
          .n8:
          jmp main_loop
          halt:
          cli
          hlt
          dap_prog:
              db 0x10, 0
              dw 63
              dw 0x0000, 0x1000
              dq 0
          dap_input:
              db 0x10, 0
              dw 63
              dw 0x0000, 0x4000
              dq 0
          times 510-($-$$) db 0
          dw 0xaa55
          EOF
          nasm -f bin seed.asm -o seed.img
          truncate -s 65536 seed.img
          
          cat << 'EOF' > build_compilers.py
          import sys
          def bf_to_rib(bf_code):
           m = {">":"1", "<":"2", "+":"3", "-":"4", ".":"5", ",":"6", "[":"7", "]":"8"}
           rib = "".join([m[c] for c in bf_code if c in m])
           f_out = "".join([x+"x" if (i+1)%5==0 else x for i, x in enumerate(rib)])
           if len(rib)%5!=0: f_out += "x"
           return f_out
          
          bf1 = ">>,+[-"
          mappings = {62:49, 60:50, 43:51, 45:52, 46:53, 44:54, 91:55, 93:56}
          for target, out in mappings.items():
           bf1 += "[->+>+<<]>>[-<<+>>]<" + "-"*target + ">+<[>[-]<[-]]>["
           bf1 += ">" + "+"*out + ".[-]<<<<+>>>>"
           bf1 += "<<<<[->>>>+>+<<<<<]>>>>>[-<<<<<+>>>>>]<"
           bf1 += "-----" + ">+<[>[-]<[-]]>["
           bf1 += ">" + "+"*120 + ".[-]<<<<<<[-]>>>>>[-]]<<[-]]<<"
          bf1 += "[-],+]"
          with open("rib_compiler.bf", "w") as f: f.write(bf1)
          with open("rib_compiler.rib", "w") as f: f.write(bf_to_rib(bf1))
          
          asm = """
          [org 0x7C00]
          jmp entry
          times 0x40-($-$$) db 0
          out_char:
              mov al, [es:di]
              mov [fs:bp], al
              inc bp
              ret
          times 0x50-($-$$) db 0
          in_char:
