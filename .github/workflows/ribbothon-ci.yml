          bf2 = "[-]"
          curr = 0
          for b in runtime:
           bf2 += emit_byte(b, curr)
           curr = b
          bf2 += ">>,+[-"
          targets = {
           49: [0x47, 0x90, 0x90, 0x90, 0x90],
           50: [0x4F, 0x90, 0x90, 0x90, 0x90],
           51: [0x26, 0xFE, 0x05, 0x90, 0x90],
           52: [0x26, 0xFE, 0x0D, 0x90, 0x90],
           53: [0xB8, 0x40, 0x7C, 0xFF, 0xD0],
           54: [0xB8, 0x50, 0x7C, 0xFF, 0xD0],
           55: [0xB8, 0x70, 0x7C, 0xFF, 0xD0],
           56: [0xB8, 0xA0, 0x7C, 0xFF, 0xD0]
          }
          for t, block in targets.items():
           bf2 += "[->+>+<<]>>[-<<+>>]<" + "-"*t + ">+<[>[-]<[-]]>["
           curr = 0
           for b in block:
            bf2 += ">" + emit_byte(b, curr) + "<"
            curr = b
           bf2 += ">[-]<[-]]<<"
          bf2 += "[-],+]"
          bf2 += ">" + emit_byte(0xFA, 0) + "<"
          bf2 += ">" + emit_byte(0xF4, 0xFA) + "<"
          with open("aot_compiler.rib", "w") as f: f.write(bf_to_rib(bf2))
          EOF
          python3 build_compilers.py
          
          cat << 'EOF' > run_qemu.py
          import sys, time, subprocess, shutil
          mode = sys.argv[1]
          out_file = sys.argv[2]
          if mode == "stage0":
              prog = sys.argv[3]; inp = sys.argv[4]
              shutil.copy(prog, "tmp_prog.img")
              shutil.copy(inp, "tmp_inp.img")
              cmd = ["qemu-system-x86_64", "-drive", "format=raw,file=seed.img,index=0,if=ide", "-drive", "format=raw,file=tmp_prog.img,index=1,if=ide", "-drive", "format=raw,file=tmp_inp.img,index=2,if=ide", "-display", "none", "-monitor", "stdio"]
          else:
              boot = sys.argv[3]; inp = sys.argv[4]
              shutil.copy(boot, "tmp_boot.img")
              shutil.copy(inp, "tmp_inp.img")
              cmd = ["qemu-system-x86_64", "-drive", "format=raw,file=tmp_boot.img,index=0,if=ide", "-drive", "format=raw,file=tmp_inp.img,index=1,if=ide", "-display", "none", "-monitor", "stdio"]
          p = subprocess.Popen(cmd, stdin=subprocess.PIPE, stdout=subprocess.DEVNULL)
          time.sleep(5)
          p.stdin.write(b"pmemsave 0x30000 65536 memdump.bin\nquit\n")
          p.stdin.flush(); p.wait()
          with open("memdump.bin", "rb") as f: open(out_file, "wb").write(f.read())
          EOF
          
          echo "=== Padding Inputs for BIOS compatibility ==="
          truncate -s 65536 rib_compiler.rib rib_compiler.bf aot_compiler.rib
          
          echo "=== Phase 1: Source-Level Self-Host (Executing strictly on Baremetal Stage 0) ==="
          python3 run_qemu.py stage0 c1.rib rib_compiler.rib rib_compiler.bf
          truncate -s 65536 c1.rib
          python3 run_qemu.py stage0 c2.rib c1.rib rib_compiler.bf
          if ! cmp -s c1.rib c2.rib; then echo "FAIL: Source-level fixed point failed"; exit 1; fi
          echo "SUCCESS: True Source-Level Full Bootstrap Achieved!"
          
          echo "=== Phase 2: Native-Level Self-Host (Executing strictly on Baremetal Stage 0) ==="
          python3 run_qemu.py stage0 gen1.img aot_compiler.rib aot_compiler.rib
          truncate -s 65536 gen1.img
          python3 run_qemu.py native gen2.img gen1.img aot_compiler.rib
          truncate -s 65536 gen2.img
          python3 run_qemu.py native gen3.img gen2.img aot_compiler.rib
          truncate -s 65536 gen3.img
          H2=$(sha256sum gen2.img | awk '{print $1}')
          H3=$(sha256sum gen3.img | awk '{print $1}')
          EMPTY="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"
          echo "Gen 2: $H2"
          echo "Gen 3: $H3"
          if [ "$H2" = "$EMPTY" ] || [ "$H3" = "$EMPTY" ]; then echo "FAIL: Output is empty!"; exit 1; fi
          if [ "$H2" != "$H3" ]; then echo "FAIL: Native fixed-point failed!"; exit 1; fi
          echo "SUCCESS: Strict absolute GCC-Free self-hosting achieved!"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ribbothon-artifacts
          path: |
            *.rib
            *.img
            *.bin
            *.bf
            *.asm
            *.py

