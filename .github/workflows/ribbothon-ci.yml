              mov es, ax
              xor di, di
              mov cx, 0x8000
              xor ax, ax
              rep stosw
              mov ax, 0x3000
              mov fs, ax
              xor bp, bp
              xor bx, bx
              jmp 0x7E00
          times 510-($-$$) db 0
          dw 0xaa55
          """
          with open("runtime.asm", "w") as f: f.write(asm)
          import subprocess
          subprocess.run(["nasm", "-f", "bin", "runtime.asm", "-o", "runtime.bin"], check=True)
          with open("runtime.bin", "rb") as f: runtime = f.read()
