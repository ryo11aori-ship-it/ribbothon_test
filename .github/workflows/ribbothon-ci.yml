              inc bx
              pop ds
              or al, al
              jnz .save
              dec bx
              mov al, 0xff
          .save:
              mov [es:di], al
              ret
          times 0x70-($-$$) db 0
          jump_fwd:
              cmp byte [es:di], 0
              jnz .done
              pop si
              mov dx, 1
          .loop:
              cmp word [si], 0xA0B8
              jne .not_close
              dec dx
              jz .found
              jmp .next
          .not_close:
              cmp word [si], 0x70B8
              jne .next
              inc dx
          .next:
              add si, 5
              jmp .loop
          .found:
              add si, 5
              push si
          .done:
              ret
          times 0xA0-($-$$) db 0
          jump_bwd:
              cmp byte [es:di], 0
              jz .done2
              pop si
              sub si, 10
              mov dx, 1
          .loop2:
              cmp word [si], 0x70B8
              jne .not_open
              dec dx
              jz .found2
              jmp .next2
          .not_open:
              cmp word [si], 0xA0B8
              jne .next2
              inc dx
          .next2:
              sub si, 5
              jmp .loop2
          .found2:
              add si, 5
              push si
          .done2:
              ret
          times 0xD0-($-$$) db 0
          dap:
              db 0x10, 0
              dw 63
              dw 0x7E00, 0x0000
              dq 1
          dap2:
              db 0x10, 0
              dw 63
              dw 0x0000, 0x4000
              dq 0
          entry:
              xor ax, ax
              mov ds, ax
              mov ss, ax
              mov sp, 0x7C00
              mov ah, 0x42
              mov dl, 0x80
              mov si, dap
              int 0x13
              mov ah, 0x42
              mov dl, 0x81
